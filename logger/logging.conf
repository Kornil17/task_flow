###############################################################################
# Логирование приложения — конфигурация для модуля logging
# Поддерживает ротацию: по времени (TimedRotatingFileHandler) и по размеру (RotatingFileHandler)
###############################################################################

[loggers]
# Список всех логгеров, которые будут сконфигурированы
keys=root,application,domain,infrastructure,presentation

[handlers]
# Список обработчиков (куда и как писать)
keys=console,app_timed,domain_timed,infra_timed,pres_timed,errors_rotating

[formatters]
# Список форматтеров (как оформлять сообщения)
keys=standard,detailed

# -----------------------------------------------------------------------------
# Форматтеры
# -----------------------------------------------------------------------------
[formatter_standard]
format=%(asctime)s [%(process)d] [%(name)s] [%(levelname)s] %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailed]
format=%(asctime)s [%(process)d] [%(name)s] [%(levelname)s] [%(filename)s:%(lineno)d] %(message)s
datefmt=%Y-%m-%d %H:%M:%S

# -----------------------------------------------------------------------------
# Корневой логгер (используется для всего, что не попало под явные логгеры)
# -----------------------------------------------------------------------------
[logger_root]
level=WARNING
handlers=console,errors_rotating
qualname=root
propagate=0

# -----------------------------------------------------------------------------
# Логгер для бизнес-логики приложения
# -----------------------------------------------------------------------------
[logger_application]
level=INFO
handlers=console,app_timed,errors_rotating
qualname=application
propagate=0

# -----------------------------------------------------------------------------
# Логгер для доменной модели
# -----------------------------------------------------------------------------
[logger_domain]
level=DEBUG                       # Доменный слой логируем детально
handlers=console,domain_timed,errors_rotating
qualname=domain
propagate=0

# -----------------------------------------------------------------------------
# Логгер для инфраструктуры
# -----------------------------------------------------------------------------
[logger_infrastructure]
level=WARNING                     # Меньше шума от инфраструктуры
handlers=console,infra_timed,errors_rotating
qualname=infrastructure
propagate=0

# -----------------------------------------------------------------------------
# Логгер для презентационного слоя
# -----------------------------------------------------------------------------
[logger_presentation]
level=INFO
handlers=console,pres_timed,errors_rotating
qualname=presentation
propagate=0

# -----------------------------------------------------------------------------
# Обработчик: вывод в консоль (stdout)
# -----------------------------------------------------------------------------
[handler_console]
class=StreamHandler
level=DEBUG
formatter=standard
args=(sys.stdout,)

# -----------------------------------------------------------------------------
# Обработчик: ротация по времени (ежедневно в полночь), хранить 30 дней
# Для application, domain, presentation, infrastructure
# -----------------------------------------------------------------------------
[handler_app_timed]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=detailed
args=('logs/application.log', 'midnight', 1, 30)

[handler_domain_timed]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=detailed
args=('logs/domain.log', 'midnight', 1, 30)

[handler_pres_timed]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=detailed
args=('logs/presentation.log', 'midnight', 1, 30)

[handler_infra_timed]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=detailed
args=('logs/infrastructure.log', 'midnight', 1, 30)

# -----------------------------------------------------------------------------
# Обработчик: общий файл ошибок (ротация по размеру, 10 МБ, 10 бэкапов)
# -----------------------------------------------------------------------------
[handler_errors_rotating]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailed
args=('logs/errors.log', 'a', 10485760, 10)