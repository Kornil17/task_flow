repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: python
        types: [python]
        pass_filenames: true
        verbose: true

      - id: ruff-check
        name: ruff-check
        entry: ruff check --fix --force-exclude
        language: python
        types: [python]
        pass_filenames: true
        verbose: true

      - id: mypy
        name: mypy
        entry: mypy
        language: python
        types: [python]
        pass_filenames: true
        verbose: true
        files: ^(src|tests)/